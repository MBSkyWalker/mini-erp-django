<head>
    <style>
        body {
            font-family: math;
            background-color: #f4f6f9;
            margin: 40px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .balance {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            background-color: #2c3e50;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f2f2f2;
        }

        .incoming {
            color: green;
            font-weight: bold;
        }

        .outgoing {
            color: red;
            font-weight: bold;
        }

        .total {
            font-weight: bold;
        }

        .back-button {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 15px;
            background-color: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .back-button:hover {
            background-color: #1a242f;
        }
    .filter-form {
    display: flex;
    align-items: center;
    gap: 10px;      /* проміжки між полями */
    margin-bottom: 20px;
    font-family: Arial, sans-serif;
    margin-top: 20px;
}

.filter-form label {
    display: flex;
    flex-direction: column;
    font-size: 14px;
    color: #333;
}

.filter-input {
    padding: 5px 10px;
    font-size: 14px;
    border: 1px solid #ccc;
    border-radius: 4px;
}

.filter-input:focus {
    border-color: #4a90e2;
    outline: none;
}

.filter-button {
    padding: 6px 15px;
    font-size: 14px;
    background-color: #4a90e2;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: background-color 0.2s;
}

.filter-button:hover {
    background-color: #357ABD;
}
.control{
    width: 100%;
    height: 2px;
    background-color: salmon;
    margin-top: 50px;
}
    </style>
</head>
{% for report in reports %}
<div class="control"></div>
<h1>{{ report.date }}</h1>
<h1>Прибуток {{ report.total_profit }}</h1>

<table>
    {% for sale in report.sales %}
    <tr>
        <td>{{ sale.product.name }}</td>
        <td>{{ sale.quantity }}</td>
        <td>{{ sale.price }}</td>
        <td>{{ sale.profit }}</td>
        {% if sale.comment %}
        <td>{{ sale.comment }}</td>
        {% else %}
        <td></td>
        {% endif %}

    </tr>
    {% endfor %}
</table>

{% endfor %}
<form method="get" class="filter-form">
    <label>
        З: <input type="date" name="start_date" class="filter-input">
    </label>
    <label>
        До: <input type="date" name="end_date" class="filter-input">
    </label>
    <button type="submit" class="filter-button">Показати</button>
</form>
 <div style="margin-top: 20px; text-align: center;">
        <a class="button" href="/" style="padding: 5px 15px; font-weight: bold;">На головну</a>
    </div>
